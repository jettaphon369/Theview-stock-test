<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>TheView Stock Free Firebase v1</title>
  <link rel="stylesheet" href="css/main.css?v=11" />
  <link rel="manifest" href="manifest.webmanifest" />
</head>
<body>
  <div id="toast" class="toast"></div>
  <section id="loginPage" class="login-page">
    <div class="login-card">
      <h1>👁️ TheView Stock</h1>
      <p class="muted">Free Firebase Edition • Spark Plan Only</p>
      <input id="email" type="email" placeholder="อีเมล" autocomplete="username" />
      <input id="password" type="password" placeholder="รหัสผ่าน" autocomplete="current-password" />
      <button id="loginBtn" class="btn primary">เข้าสู่ระบบ</button>
      <button id="registerBtn" class="btn light">สมัครบัญชีใหม่</button>
      <p class="note">ใช้ Firebase Spark Plan เท่านั้น และห้ามเปิด Billing</p>
    </div>
  </section>

  <section id="app" class="app hidden">
    <header class="hero">
      <div>
        <h1>👁️ TheView Stock</h1>
        <p>Mobile First • Free Sync System • <span style="opacity:.7">build v11</span></p>
      </div>
      <button id="logoutBtn" class="chip">ออก</button>
    </header>

    <main id="view" class="page"></main>

    <nav class="bottom-nav">
      <button data-page="home" class="active"><span>🏠</span>หน้าแรก</button>
      <button data-page="stock"><span>📦</span>Stock</button>
      <button data-page="scan"><span>📷</span>AI</button>
      <button data-page="approval"><span>✅</span>ตรวจ</button>
      <button data-page="profile"><span>👤</span>โปรไฟล์</button>
    </nav>
  </section>

  <div id="modal" class="modal hidden">
    <div class="sheet">
      <div class="between">
        <h2 id="modalTitle">Modal</h2>
        <button id="closeModal" class="btn small">ปิด</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />
  <input id="photoInput" type="file" accept="image/*" hidden />
  <input id="fileInput" type="file" accept="image/*,.png,.jpg,.jpeg,.webp,.heic,.heif,.gif,.bmp" hidden />

  <script type="module" src="js/app.js?v=11"></script>
</body>
</html>
